{% extends "base.html" %}
{% block content %}

<style>
    /* Full height centering for mobile */
    .login-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
    }

    .login-card {
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        padding: 30px;
        width: 100%;
        max-width: 400px; /* Desktop width limit */
        border-top: 5px solid #f59e0b; /* Golden Accent */
    }

    .login-header i {
        font-size: 3rem;
        color: #1e3a8a; /* Deep Blue */
        margin-bottom: 15px;
    }

    .form-floating > .form-control:focus {
        border-color: #f59e0b;
        box-shadow: 0 0 0 0.25rem rgba(245, 158, 11, 0.1);
    }

    .btn-login {
        background: #1e3a8a;
        border: none;
        padding: 12px;
        font-weight: 600;
        border-radius: 12px;
        transition: 0.3s;
        color: white;
    }

    .btn-login:hover {
        background: #162e70;
        transform: translateY(-2px);
        color: white;
    }

    /* Mobile adjustments */
    @media (max-width: 576px) {
        .login-card {
            margin: 0 15px;
            padding: 25px 20px;
        }
        .login-header h4 {
            font-size: 1.25rem;
        }
    }
</style>

<div class="login-wrapper">
    <div class="login-card animate__animated animate__fadeInUp">
        
        <div class="login-header text-center mb-4">
            <i class="fas fa-user-shield"></i>
            <h4 class="fw-bold text-dark">Admin Login</h4>
            <p class="text-muted small">Manage Balaji Krishna Coaching Portal</p>
        </div>

        <form method="POST">
            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control rounded-3" id="userInput" placeholder="Username" required>
                <label for="userInput"><i class="fas fa-user me-2"></i>Username</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" name="password" class="form-control rounded-3" id="passInput" placeholder="Password" required>
                <label for="passInput"><i class="fas fa-lock me-2"></i>Password</label>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-login shadow-sm">
                    Access Dashboard <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </div>
        </form>

        <div class="text-center mt-4">
            <small class="text-muted">Forgot password? Contact Gunda baba ji</small>
        </div>
    </div>
</div>

return redirect("/dashboard")

{% endblock %}
