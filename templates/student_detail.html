{% extends "base.html" %}
{% block content %}

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
    }
    .main-card {
        background: #ffffff;
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        margin-top: 2rem;
    }
    .profile-header {
        background: #f1f5f9;
        padding: 30px;
        border-bottom: 1px solid #e2e8f0;
    }
    .percentage-circle {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 4px solid #10b981;
        font-weight: 700;
        color: #065f46;
        box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
    }
    .table thead th {
        background-color: #f8fafc;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        color: #64748b;
        border-top: none;
        padding: 15px;
    }
    .status-badge {
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 0.85rem;
        font-weight: 500;
    }
    .bg-present { background-color: #dcfce7; color: #166534; }
    .bg-absent { background-color: #fee2e2; color: #991b1b; }
    
    .btn-back {
        transition: all 0.3s ease;
        border-radius: 8px;
        padding: 10px 20px;
    }
    .btn-back:hover {
        transform: translateX(-5px);
        background-color: #64748b;
        color: white;
    }
</style>

<div class="container pb-5">
    <div class="main-card">
        <div class="profile-header d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold text-dark mb-1">{{ name }}</h2>
                <p class="text-muted mb-0"><i class="fas fa-chart-line me-1"></i> Attendance Performance</p>
            </div>
            <div class="percentage-circle">
                {{ percentage }}%
            </div>
        </div>

        <div class="p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">Date of Entry</th>
                            <th class="text-end pe-4">Attendance Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for r in records %}
                        <tr>
                            <td class="ps-4 py-3 align-middle">
                                <span class="text-dark fw-medium">{{ r[0] }}</span>
                            </td>
                            <td class="text-end pe-4 py-3">
                                {% if r[1] == "present" %}
                                    <span class="status-badge bg-present">
                                        <i class="fas fa-check-circle me-1"></i> Present
                                    </span>
                                {% else %}
                                    <span class="status-badge bg-absent">
                                        <i class="fas fa-times-circle me-1"></i> Absent
                                    </span>
                                {% endif %}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white border-top-0 p-4">
            <a href="/" class="btn btn-outline-secondary btn-back text-decoration-none">
                <i class="fas fa-arrow-left me-2"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>

{% endblock %}
